name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - '*'

jobs:
  build:
    if: github.ref_type == 'branch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build with Gradle
        if: runner.os != 'Windows'
        run: ./gradlew build --no-daemon

      - name: Build with Gradle
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat build --no-daemon

  publish:
    if: github.ref_type == 'tag'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            tasks: >
              publishKotlinMultiplatformPublicationToMavenCentral
              publishJvmPublicationToMavenCentral
              publishJsPublicationToMavenCentral
              publishWasmJsPublicationToMavenCentral
              publishAndroidPublicationToMavenCentral
              publishLinuxX64PublicationToMavenCentral
              publishLinuxArm64PublicationToMavenCentral

          - os: macos-latest
            tasks: >
              publishMacosArm64PublicationToMavenCentral
              publishIosX64PublicationToMavenCentral
              publishIosArm64PublicationToMavenCentral
              publishIosSimulatorArm64PublicationToMavenCentral
              publishTvosArm64PublicationToMavenCentral
              publishTvosSimulatorArm64PublicationToMavenCentral
              publishWatchosArm32PublicationToMavenCentral
              publishWatchosArm64PublicationToMavenCentral
              publishWatchosDeviceArm64PublicationToMavenCentral
              publishWatchosSimulatorArm64PublicationToMavenCentral

          - os: windows-latest
            task: publishMingwX64PublicationToMavenCentral

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    env:
      CI_COMMIT_TAG: ${{ github.ref_name }}
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Publish to Maven Central
        if: runner.os != 'Windows'
        run: ./gradlew ${{ matrix.tasks }} --no-daemon

      - name: Publish to Maven Central
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat ${{ matrix.task }} --no-daemon